<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta name="google-site-verification" content="RBcbL8AYJjliIRHq75ksyYcECK3R2FOKXBRkzCWlKAs" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>چت‌بات Gemini</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            padding: 20px;
        }
        .chat-container {
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            height: 90vh;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .header {
            padding: 16px 24px;
            background: rgba(255, 255, 255, 0.08);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }
        .header .left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header h1 { color: white; font-size: 18px; display: flex; align-items: center; gap: 8px; }
        .header h1 span { font-size: 24px; }
        .header .user-info { color: rgba(255, 255, 255, 0.5); font-size: 13px; }
        .header .user-info a { color: #667eea; text-decoration: none; }
        .header .user-info a:hover { text-decoration: underline; }
        .header .status {
            color: #4ade80;
            font-size: 12px;
            background: rgba(74, 222, 128, 0.1);
            padding: 4px 12px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .header .status .dot {
            width: 6px;
            height: 6px;
            background: #4ade80;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .header-actions { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .header-actions button {
            background: rgba(255, 255, 255, 0.08);
            border: none;
            color: rgba(255, 255, 255, 0.7);
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.2s;
        }
        .header-actions button:hover { background: rgba(255, 255, 255, 0.15); }
        .header-actions .clear-btn:hover { background: rgba(255, 0, 0, 0.2); color: #f87171; }
        .file-info {
            background: rgba(102, 126, 234, 0.15);
            border: 1px solid rgba(102, 126, 234, 0.2);
            border-radius: 12px;
            padding: 8px 16px;
            margin: 0 20px 8px 20px;
            display: none;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            color: #e0e7ff;
            font-size: 13px;
        }
        .file-info.show { display: flex; }
        .file-info .file-name { display: flex; align-items: center; gap: 8px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .file-info .file-name span { font-size: 18px; }
        .file-info .file-size { color: rgba(255, 255, 255, 0.5); font-size: 12px; }
        .file-info .remove-file {
            background: rgba(255, 0, 0, 0.2);
            border: none;
            color: #f87171;
            padding: 4px 12px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.2s;
        }
        .file-info .remove-file:hover { background: rgba(255, 0, 0, 0.3); }
        .messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            max-width: 85%;
            padding: 12px 18px;
            border-radius: 16px;
            font-size: 15px;
            line-height: 1.6;
            animation: fadeIn 0.3s ease;
            word-wrap: break-word;
        }
        .message.user {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .message.bot {
            background: rgba(255, 255, 255, 0.1);
            color: #e0e7ff;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .message.bot .time {
            display: block;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 6px;
        }
        .message.bot .model-badge {
            display: inline-block;
            font-size: 10px;
            background: rgba(102, 126, 234, 0.2);
            padding: 2px 10px;
            border-radius: 12px;
            margin-top: 6px;
            color: #818cf8;
        }
        .message.error {
            background: rgba(255, 0, 0, 0.15);
            color: #f87171;
            border: 1px solid rgba(255, 0, 0, 0.15);
            align-self: center;
        }
        .typing {
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
            padding: 8px 16px;
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            border-bottom-left-radius: 4px;
            display: none;
        }
        .typing.active { display: block; }
        .input-area {
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.05);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .input-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .input-row input[type="text"] {
            flex: 1;
            padding: 12px 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.08);
            color: white;
            font-size: 15px;
            outline: none;
            transition: border 0.3s;
            min-width: 150px;
        }
        .input-row input[type="text"]::placeholder { color: rgba(255, 255, 255, 0.3); }
        .input-row input[type="text"]:focus { border-color: #667eea; }
        .input-row button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 24px;
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            white-space: nowrap;
        }
        .input-row button:hover:not(:disabled) { transform: scale(1.02); box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3); }
        .input-row button:active:not(:disabled) { transform: scale(0.98); }
        .input-row button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .upload-btn-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }
        .upload-btn-wrapper input[type=file] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }
        .upload-btn {
            padding: 10px 16px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            color: #a8b5e0;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }
        .upload-btn:hover { background: rgba(255, 255, 255, 0.15); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .scrollbar::-webkit-scrollbar { width: 4px; }
        .scrollbar::-webkit-scrollbar-track { background: transparent; }
        .scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }
        @media (max-width: 640px) {
            body { padding: 0; }
            .chat-container { height: 100vh; border-radius: 0; }
            .header h1 { font-size: 15px; }
            .header .user-info { font-size: 11px; }
            .input-row { flex-wrap: wrap; gap: 6px; }
            .input-row input[type="text"] { font-size: 14px; padding: 10px 14px; flex: 1 1 100%; order: 1; }
            .input-row button { padding: 10px 18px; font-size: 14px; flex: 1; order: 2; }
            .upload-btn-wrapper { order: 3; flex: 0 0 auto; }
            .upload-btn { padding: 8px 14px; font-size: 12px; }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="header">
            <div class="left">
                <h1><span>🧠</span> Gemini Chat</h1>
                <span class="status"><span class="dot"></span> آنلاین</span>
            </div>
            <div>
                <span class="user-info">
                    👤 {{ username }} | 
                    <a href="{{ url_for('profile') }}">پروفایل</a> | 
                    <a href="{{ url_for('logout') }}" style="color:#f87171;">خروج</a>
                </span>
            </div>
        </div>

        <div class="file-info" id="fileInfo">
            <div class="file-name"><span>📎</span><span id="fileName">فایل.txt</span><span class="file-size" id="fileSize">(۰ KB)</span></div>
            <button class="remove-file" id="removeFile">✕ حذف</button>
        </div>

        <div class="messages scrollbar" id="messages">
            <div class="message bot">سلام {{ username }}! 👋 من Gemini هستم. خوش آمدید!</div>
            <div class="typing" id="typing">🧠 در حال تایپ...</div>
        </div>

        <div class="input-area">
            <div class="input-row">
                <input type="text" id="userInput" placeholder="سوال خود را بپرسید..." autofocus>
                <button id="sendBtn">ارسال</button>
                <div class="upload-btn-wrapper">
                    <div class="upload-btn">📎</div>
                    <input type="file" id="fileInput" accept=".txt,.pdf,.docx,.py,.js,.html,.css,.json,.csv,.md">
                </div>
                <button class="clear-btn" id="clearHistory" style="background:rgba(255,0,0,0.1);color:#f87171;">🗑️</button>
            </div>
        </div>
    </div>

</body>
</html>
