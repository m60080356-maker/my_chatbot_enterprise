<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ثبت نام - چت‌بات Gemini</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .register-box {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .register-box h1 {
            color: white;
            text-align: center;
            font-size: 28px;
            margin-bottom: 10px;
        }
        .register-box .subtitle {
            color: rgba(255, 255, 255, 0.5);
            text-align: center;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            color: rgba(255, 255, 255, 0.7);
            display: block;
            font-size: 14px;
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-size: 15px;
            outline: none;
            transition: border 0.3s;
        }
        .form-group input:focus {
            border-color: #667eea;
        }
        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
        }
        .btn:active { transform: scale(0.98); }
        .links {
            text-align: center;
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 14px;
        }
        .links a {
            color: #667eea;
            text-decoration: none;
        }
        .links a:hover { text-decoration: underline; }
        .flash {
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .flash.success { background: rgba(0, 255, 0, 0.1); color: #4ade80; border: 1px solid rgba(0, 255, 0, 0.1); }
        .flash.error { background: rgba(255, 0, 0, 0.1); color: #f87171; border: 1px solid rgba(255, 0, 0, 0.1); }
        .flash.info { background: rgba(59, 130, 246, 0.1); color: #60a5fa; border: 1px solid rgba(59, 130, 246, 0.1); }
        @media (max-width: 480px) {
            .register-box { padding: 24px; }
            .register-box h1 { font-size: 22px; }
        }
    </style>
</head>
<body>
    <div class="register-box">
        <h1>🧠 ثبت نام</h1>
        <p class="subtitle">ایجاد حساب کاربری جدید</p>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash {{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        <form method="POST">
            <div class="form-group">
                <label>نام کاربری</label>
                <input type="text" name="username" placeholder="حداقل ۳ کاراکتر" required autofocus>
            </div>
            <div class="form-group">
                <label>ایمیل (اختیاری)</label>
                <input type="email" name="email" placeholder="example@email.com">
            </div>
            <div class="form-group">
                <label>رمز عبور</label>
                <input type="password" name="password" placeholder="حداقل ۶ کاراکتر" required>
            </div>
            <button type="submit" class="btn">ثبت نام</button>
        </form>
        
        <div class="links">
            قبلاً ثبت نام کرده‌اید؟ <a href="{{ url_for('login') }}">ورود</a>
        </div>
    </div>
</body>
</html>
